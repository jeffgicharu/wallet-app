name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run test:cov
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-report
          path: coverage/
          retention-days: 14
      - name: Generate consumer pact
        run: npm run test:pact:ci
      - name: Detect uncommitted pact drift
        run: |
          if ! git diff --exit-code pacts/; then
            echo "::error::Consumer pact tests regenerated pacts/ to a different shape than what is committed."
            echo "::error::Run 'npm run test:pact' locally and commit the updated pact file."
            exit 1
          fi
      - name: Upload pact artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-pacts
          path: pacts/
          retention-days: 30
      - run: npm run build
      - run: docker build -t wallet-app:${{ github.sha }} .
